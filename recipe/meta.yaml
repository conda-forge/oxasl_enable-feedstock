{% set name = "oxasl_enable" %}
{% set version = "0.0.2.post2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/oxasl-enable-{{ version }}.tar.gz
  sha256: b5aa42ec144de3594355168372dde29e8884ab0e97ed97488f29d53cf3709ead

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - nibabel
    - numpy
    - oxasl
    - pandas
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - oxasl_enable

about:
  home: https://oxasl.readthedocs.io/
  summary: Python implementation of the ENABLE quality-based volume selection algorithm for ASL-MRI data
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mcraig-ibme
